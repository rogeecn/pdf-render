<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebook Viewer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Floating toolbar overlay -->
    <div id="toolbar">
      <div id="toolbar-left">
        <a href="/" id="back-btn" class="icon-btn" title="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <button id="toggle-outline" class="icon-btn" title="Table of Contents" aria-pressed="false" style="display: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div id="toolbar-right">
        <span id="page-indicator">Loading...</span>
        <button id="toggle-settings" class="icon-btn" title="Settings" aria-pressed="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <!-- Settings popover panel -->
    <div id="settings-panel" class="settings-panel" aria-hidden="true">
      <!-- Zoom -->
      <div class="settings-section">
        <div class="settings-section-title">Zoom</div>
        <div class="settings-row">
          <button id="zoom-out" class="settings-action-btn" title="Zoom Out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <span id="zoom-level">100%</span>
          <button id="zoom-in" class="settings-action-btn" title="Zoom In">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
        </div>
      </div>

      <!-- View modes -->
      <div class="settings-section">
        <div class="settings-section-title">View</div>
        <div class="settings-grid">
          <button id="fit-width" class="settings-option-btn" title="Fit Width">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            <span>Fit W</span>
          </button>
          <button id="fit-page" class="settings-option-btn" title="Fit Page">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <span>Fit P</span>
          </button>
          <button id="toggle-mode" class="settings-option-btn" title="Toggle Paged Mode" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="18" rx="1"/><rect x="15" y="3" width="7" height="18" rx="1"/></svg>
            <span>Paged</span>
          </button>
          <button id="toggle-autoscroll" class="settings-option-btn" title="Auto Scroll" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>Auto</span>
          </button>
        </div>
      </div>

      <!-- Auto scroll speed -->
      <div id="autoscroll-speed-section" class="settings-section" style="display: none;">
        <div class="settings-section-title">Scroll Speed</div>
        <div class="settings-row">
          <input type="range" id="autoscroll-speed" min="10" max="50" value="30" title="Scroll Speed">
          <span id="autoscroll-speed-value">30</span>
        </div>
      </div>

      <!-- Background -->
      <div class="settings-section">
        <div class="settings-section-title">Background</div>
        <div class="settings-bg-presets">
          <button class="bg-preset active" data-bg="#525659" title="Default Gray"><span class="bg-swatch" style="background:#525659;"></span>Default</button>
          <button class="bg-preset" data-bg="#f5f0e8" title="Warm Sepia"><span class="bg-swatch" style="background:#f5f0e8;"></span>Sepia</button>
          <button class="bg-preset" data-bg="#ffffff" title="White"><span class="bg-swatch" style="background:#ffffff; border:1px solid #ccc;"></span>White</button>
          <button class="bg-preset" data-bg="#2b2b2b" title="Dark"><span class="bg-swatch" style="background:#2b2b2b;"></span>Dark</button>
          <button class="bg-preset" data-bg="#000000" title="Black"><span class="bg-swatch" style="background:#000000;"></span>Black</button>
        </div>
      </div>
    </div>

    <div id="viewport">
      <div id="outline-panel">
        <div id="outline-header">
          <span>Table of Contents</span>
          <button id="close-outline" title="Close">×</button>
        </div>
        <div id="outline-tree"></div>
      </div>
      <div id="page-container"></div>
    </div>
  </div>

  <script type="module" src="/js/viewer-app.js"></script>
</body>
</html>
